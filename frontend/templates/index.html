<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Time</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">Table Time</div>
            <nav>
                <button class="nav-btn active" data-view="table">Table</button>
                <button class="nav-btn" data-view="calendar">Calendar</button>
                <button class="nav-btn" data-view="agenda">Agenda</button>
            </nav>
            <button id="add-task-btn" class="primary-btn">+ New Task</button>
        </header>

        <main id="main-content">
            <!-- Table View -->
            <section id="view-table" class="view-section active">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>Title</th>
                                <th>Deadline</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="task-table-body">
                            <!-- Tasks injected here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Calendar View -->
            <section id="view-calendar" class="view-section">
                <div class="calendar-header">
                    <h2 id="calendar-month-year">Moment</h2>
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    <!-- Calendar days injected here -->
                </div>
            </section>

            <!-- Agenda View -->
            <section id="view-agenda" class="view-section">
                <div class="agenda-container" id="agenda-list">
                    <!-- Agenda items injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">New Task</h2>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required placeholder="What needs to be done?">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Details..."></textarea>
                </div>
                <div class="form-group">
                    <label for="deadline">Deadline</label>
                    <input type="datetime-local" id="deadline" required>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="pending">Pending</option>
                        <option value="done">Done</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="primary-btn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
